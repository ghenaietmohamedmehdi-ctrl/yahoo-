<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مهدي سان - JLPT N5</title>
    <style>
        :root {
            --primary-green: #38ef7d;
            --secondary-green: #11998e;
            --card-front: #ffffff;
            --card-back: #f8f9fa;
            --text-dark: #2d3436;
            --gold: #ffb142;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* خلفية مرحة ومبهجة متدرجة الألوان مع حركة خفيفة */
            background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* الهوية البصرية العلوية */
        header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            gap: 15px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid rgba(255,255,255,0.5);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 0 0 20px 20px;
            margin-bottom: 20px;
        }
        .app-title {
            font-size: 32px;
            font-weight: 900;
            color: #2c3e50;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.7);
        }
        .app-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid #fff;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            position: relative;
        }
        .algeria-flag {
            width: 100%; height: 100%;
            display: flex; position: relative;
        }
        .flag-left { width: 50%; background: #006233; }
        .flag-right { width: 50%; background: #ffffff; }
        .flag-star-crescent {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #d21034;
            font-size: 20px;
            line-height: 1;
        }

        /* شريط تقدم الكرة */
        .progress-container {
            width: 90%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .progress-track {
            position: relative;
            background: #dfe6e9;
            height: 8px;
            border-radius: 4px;
            margin: 20px 0;
        }
        .progress-ball {
            position: absolute;
            top: -15px;
            left: 0%;
            font-size: 30px;
            transition: left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform: translateX(-50%);
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translate(-50%, 0); }
            50% { transform: translate(-50%, -10px); }
        }

        /* حاوية البطاقة القلابة ثلاثية الأبعاد */
        .flip-card {
            background-color: transparent;
            width: 90%;
            max-width: 400px;
            height: 450px;
            perspective: 1000px; /* تأثير العمق ثلاثي الأبعاد */
            margin-bottom: 30px;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s;
            transform-style: preserve-3d;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border-radius: 20px;
        }
        /* تفعيل القلب عند إضافة هذا الكلاس البرمجي */
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        /* وجه وظهر البطاقة */
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* الوجه الأمامي (السؤال) */
        .flip-card-front {
            background: linear-gradient(135deg, var(--card-front) 0%, #f1f2f6 100%);
            border: 4px solid var(--secondary-green);
        }
        .word-jp {
            font-size: 55px;
            color: var(--text-dark);
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        /* زر النطق الصوتي */
        .audio-btn {
            background: #fff;
            border: 2px solid var(--primary-green);
            color: var(--secondary-green);
            border-radius: 50%;
            width: 60px; height: 60px;
            font-size: 28px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            margin-bottom: 25px;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(56, 239, 125, 0.3);
        }
        .audio-btn:hover {
            transform: scale(1.1);
            background: var(--primary-green);
            color: white;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }
        .option-btn {
            background: #fff;
            color: var(--text-dark);
            border: 2px solid #dfe6e9;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .option-btn:hover {
            background: var(--primary-green);
            color: white;
            border-color: var(--primary-green);
        }

        /* الوجه الخلفي (النتيجة) */
        .flip-card-back {
            background: linear-gradient(135deg, #ffffff 0%, #eccc68 100%);
            border: 4px solid #ffa502;
            transform: rotateY(180deg);
        }
        .result-icon { font-size: 70px; margin-bottom: 10px; }
        .correct-ans-ar { font-size: 32px; font-weight: bold; color: #2f3542; margin-bottom: 5px; }
        .correct-ans-ro { font-size: 22px; color: #57606f; font-style: italic; margin-bottom: 30px; }
        
        .next-btn {
            background: #ff4757;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(255, 71, 87, 0.4);
            transition: transform 0.2s;
        }
        .next-btn:active { transform: scale(0.95); }

    </style>
</head>
<body>

    <!-- الهوية العلوية -->
    <header>
        <div class="app-icon">
            <div class="algeria-flag">
                <div class="flag-left"></div>
                <div class="flag-right"></div>
                <div class="flag-star-crescent">☪★</div>
            </div>
        </div>
        <div class="app-title">مهدي سان</div>
    </header>

    <!-- شريط تقدم الكرة المونديالية -->
    <div class="progress-container">
        <div style="display: flex; justify-content: space-between; font-weight: bold; color: #2d3436; margin-bottom: 5px;">
            <span>مرحلة التدريب</span>
            <span>الكلمة: <span id="current-index">1</span> / 72</span>
        </div>
        <div class="progress-track">
            <div class="progress-ball" id="soccerBall">⚽</div>
        </div>
    </div>

    <!-- البطاقة القلابة ثلاثية الأبعاد -->
    <div class="flip-card" id="flashCard">
        <div class="flip-card-inner">
            
            <!-- وجه البطاقة (السؤال والنطق) -->
            <div class="flip-card-front">
                <div class="word-jp" id="target-word">あさ</div>
                <!-- زر النطق -->
                <button class="audio-btn" onclick="playAudio()" title="استمع للكلمة">🔊</button>
                
                <div class="options-grid" id="options-container">
                    <!-- تتولد الخيارات برمجياً -->
                </div>
            </div>

            <!-- ظهر البطاقة (النتيجة) -->
            <div class="flip-card-back">
                <div class="result-icon" id="result-emoji">✅</div>
                <h2 id="result-message" style="margin: 0; color: #2d3436;">إجابة صحيحة!</h2>
                <div class="correct-ans-ar" id="back-arabic">الصباح</div>
                <div class="correct-ans-ro" id="back-romaji">Asa</div>
                <button class="next-btn" onclick="nextQuestion()">التالي ⚽</button>
            </div>

        </div>
    </div>

    <script>
        // قاعدة البيانات الكاملة لـ 72 كلمة
        const wordsDataset = [
            { j: "あさ", r: "Asa", a: "الصباح" }, { j: "あき", r: "Aki", a: "الخريف" }, { j: "かわ", r: "Kawa", a: "نهر" }, 
            { j: "はる", r: "Haru", a: "الربيع" }, { j: "なつ", r: "Natsu", a: "الصيف" }, { j: "ふゆ", r: "Fuyu", a: "الشتاء" }, 
            { j: "やま", r: "Yama", a: "جبل" }, { j: "ゆき", r: "Yuki", a: "ثلج" }, { j: "よる", r: "Yoru", a: "الليل" }, 
            { j: "はっぱ", r: "Happa", a: "ورقة شجر" }, { j: "きょう", r: "Kyou", a: "اليوم" }, { j: "ごぜん", r: "Gozen", a: "صباحاً (AM)" },
            { j: "さかな", r: "Sakana", a: "سمكة" }, { j: "とり", r: "Tori", a: "طائر" }, { j: "ねこ", r: "Neko", a: "قطة" }, 
            { j: "いぬ", r: "Inu", a: "كلب" }, { j: "ぱんだ", r: "Panda", a: "باندا" }, { j: "さんま", r: "Sanma", a: "سمك الساورة" }, 
            { j: "おかあさん", r: "Okaasan", a: "الأم" }, { j: "おとうさん", r: "Otousan", a: "الأب" }, { j: "おとうと", r: "Otouto", a: "الأخ الأصغر" }, 
            { j: "おにいさん", r: "Oniisan", a: "الأخ الأكبر" }, { j: "おねえさん", r: "Oneesan", a: "الأخت الكبرى" }, { j: "いもうと", r: "Imouto", a: "الأخت الصغرى" }, 
            { j: "せんせい", r: "Sensei", a: "معلم" }, { j: "がくせい", r: "Gakusei", a: "طالب" }, { j: "かいしゃいん", r: "Kaishayin", a: "موظف شركة" }, 
            { j: "きゃく", r: "Kyaku", a: "ضيف/زبون" }, { j: "なまえ", r: "Namae", a: "اسم" },
            { j: "とんかつ", r: "Tonkatsu", a: "شرائح لحم مقلية" }, { j: "てんぷら", r: "Tenpura", a: "تمبورا" }, { j: "たまご", r: "Tamago", a: "بيض" }, 
            { j: "みず", r: "Mizu", a: "ماء" }, { j: "ごはん", r: "Gohan", a: "أرز مطبوخ/وجبة" }, { j: "ぎゅうにく", r: "Gyuuniku", a: "لحم بقر" }, 
            { j: "おちゃ", r: "Ocha", a: "شاي أخضر" }, { j: "こうちゃ", r: "Koocha", a: "شاي أسود" }, { j: "ぎゅうにゅう", r: "Gyuunyuu", a: "حليب" }, 
            { j: "こんにゃく", r: "Konnyaku", a: "هلام الكونياكو" }, { j: "かんぱい", r: "Kanpai", a: "في صحتك / نخبك" },
            { j: "くつ", r: "Kutsu", a: "حذاء" }, { j: "さいふ", r: "Saifu", a: "محفظة" }, { j: "ふね", r: "Fune", a: "سفينة/قارب" }, 
            { j: "てんと", r: "Tento", a: "خيمة" }, { j: "ほん", r: "Hon", a: "كتاب" }, { j: "にほん", r: "Nihon", a: "اليابان" }, 
            { j: "かんこく", r: "Kankoku", a: "كوريا الجنوبية" }, { j: "ちゅうごく", r: "Chuugoku", a: "الصين" }, { j: "とけい", r: "Tokei", a: "ساعة" }, 
            { j: "でんわ", r: "Denwa", a: "هاتف" }, { j: "えいご", r: "Eigo", a: "اللغة الإنجليزية" }, { j: "かばん", r: "Kaban", a: "حقيبة" }, 
            { j: "きっぷ", r: "Kippu", a: "تذكرة" }, { j: "ざっし", r: "Zasshi", a: "مجلة" }, { j: "いっかい", r: "Ikkai", a: "مرة واحدة / الطابق الأول" }, 
            { j: "ひゃくえん", r: "Hyakuen", a: "100 ين" }, { j: "えき", r: "Eki", a: "محطة" }, { j: "ぎんこう", r: "Ginkou", a: "بنك" }, 
            { j: "ゆうびんきょく", r: "Yuubinkyoku", a: "مكتب البريد" }, { j: "きょうしつ", r: "Kyoushitsu", a: "قاعة الدرس" }, { j: "としょかん", r: "Toshokan", a: "مكتبة" }, 
            { j: "びじゅつかん", r: "Bijutsukan", a: "متحف الفنون" }, { j: "がっこう", r: "Gakkou", a: "مدرسة" }, { j: "びょういん", r: "Byouin", a: "مستشفى" }, 
            { j: "えいが", r: "Eiga", a: "فيلم/سينما" }, { j: "おんがく", r: "Ongaku", a: "موسيقى" }, { j: "りょこう", r: "Ryokou", a: "سفر/رحلة" }, 
            { j: "どくしょ", r: "Dokusho", a: "قراءة الكتب" }, { j: "しゅみ", r: "Shumi", a: "هواية" }, { j: "りょうり", r: "Ryouri", a: "الطبخ" }, 
            { j: "は", r: "Ha", a: "سن / ورقة شجر" }, { j: "みみ", r: "Mimi", a: "أذن" }
        ];

        let currentIndex = 0;
        let currentData = null;

        // تهيئة محرك النطق
        const synth = window.speechSynthesis;

        function initApp() {
            loadQuestion();
        }

        function playAudio() {
            if (synth.speaking) {
                synth.cancel(); // إيقاف النطق السابق إن وجد
            }
            const utterThis = new SpeechSynthesisUtterance(currentData.j);
            utterThis.lang = 'ja-JP'; // تحديد اللغة اليابانية
            utterThis.rate = 0.8;     // إبطاء الصوت قليلاً ليكون أوضح للتعلم
            synth.speak(utterThis);
        }

        function loadQuestion() {
            if (currentIndex >= wordsDataset.length) {
                alert("🎉 مبروك يا مهدي سان! لقد أنهيت جميع الكلمات بنجاح.");
                currentIndex = 0;
            }

            currentData = wordsDataset[currentIndex];
            
            // تحديث البيانات في الوجهين
            document.getElementById('current-index').innerText = currentIndex + 1;
            document.getElementById('target-word').innerText = currentData.j;
            
            document.getElementById('back-arabic').innerText = currentData.a;
            document.getElementById('back-romaji').innerText = currentData.r;

            // تحديث الكرة
            const percentage = (currentIndex / wordsDataset.length) * 100;
            document.getElementById('soccerBall').style.left = percentage + '%';

            // إنشاء الخيارات العشوائية
            let options = [currentData.a];
            while (options.length < 4) {
                let randomWord = wordsDataset[Math.floor(Math.random() * wordsDataset.length)].a;
                if (!options.includes(randomWord)) {
                    options.push(randomWord);
                }
            }
            options.sort(() => Math.random() - 0.5);

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => selectAnswer(opt, currentData.a);
                container.appendChild(btn);
            });
            
            // تشغيل النطق تلقائياً عند ظهور الكلمة (اختياري)
            // playAudio(); 
        }

        function selectAnswer(selected, correct) {
            const isCorrect = (selected === correct);
            
            // تخصيص ظهر البطاقة بناءً على الإجابة
            const resultEmoji = document.getElementById('result-emoji');
            const resultMsg = document.getElementById('result-message');
            const cardBack = document.querySelector('.flip-card-back');

            if (isCorrect) {
                resultEmoji.innerText = '⚽🥅';
                resultMsg.innerText = 'هدف رائع! إجابة صحيحة';
                cardBack.style.background = 'linear-gradient(135deg, #f6e58d 0%, #ffbe76 100%)';
            } else {
                resultEmoji.innerText = '❌';
                resultMsg.innerText = 'محاولة جيدة، لكنها خاطئة!';
                cardBack.style.background = 'linear-gradient(135deg, #ff7979 0%, #eb4d4b 100%)';
            }

            // قلب البطاقة
            document.getElementById('flashCard').classList.add('flipped');
        }

        function nextQuestion() {
            // إرجاع البطاقة لوجهها الأول
            document.getElementById('flashCard').classList.remove('flipped');
            
            // الانتظار حتى تنتهي حركة القلب ثم تحميل السؤال التالي
            setTimeout(() => {
                currentIndex++;
                loadQuestion();
            }, 400); // 400 مللي ثانية (نصف مدة الحركة CSS)
        }

        // تشغيل التطبيق
        window.onload = initApp;
    </script>
</body>
</html>
