<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mehdi Sensei | 🌸 رحلة الساكورا</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #0e041d;
    --glow-purple: rgba(157, 78, 221, 0.6);
    --glow-pink: rgba(247, 37, 133, 0.6);
    --neon-pink: #f72585;
    --neon-purple: #9d4edd;
    --sky-blue: #4cc9f0;
    --gold: #ffd60a;
    --text: #ffffff;
    --glass: rgba(255, 255, 255, 0.1);
  }

  body {
    margin: 0;
    background: radial-gradient(circle at top right, #240046, #0e041d);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Sakura Background Effect */
  .sakura-container { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .sakura { position: absolute; color: var(--glow-pink); font-size: 20px; animation: fall linear infinite; opacity: 0.6; }

  @keyframes fall {
    0% { transform: translateY(-10vh) rotate(0deg); }
    100% { transform: translateY(110vh) rotate(360deg); }
  }

  /* Header Section */
  .header-ui {
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 2;
  }

  .samurai-wrapper { font-size: 60px; filter: drop-shadow(0 0 10px var(--neon-purple)); margin-bottom: 10px; }
  
  .welcome-board {
    background: var(--glass);
    backdrop-filter: blur(10px);
    padding: 15px 30px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);
    text-align: center;
    font-size: 20px;
    font-weight: 900;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }

  /* Progress Bar */
  .progress-glass {
    width: 90%;
    max-width: 500px;
    background: var(--glass);
    backdrop-filter: blur(8px);
    padding: 15px;
    border-radius: 50px;
    margin: 20px auto;
    display: flex;
    justify-content: space-around;
    font-size: 12px;
    border: 1px solid var(--sky-blue);
  }

  /* Stages Map */
  .map-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
    padding: 20px;
    position: relative;
  }

  .stage-node {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: var(--glass);
    border: 4px solid var(--neon-purple);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: 0 0 20px var(--glow-purple);
    transition: 0.3s;
  }

  .stage-node.locked { border-color: #444; filter: grayscale(1); }
  .stage-node .lock-icon { position: absolute; font-size: 24px; top: -10px; }

  /* Path Beam */
  .path-beam {
    width: 6px;
    height: 60px;
    background: linear-gradient(to bottom, var(--neon-purple), var(--neon-pink));
    box-shadow: 0 0 10px var(--neon-pink);
  }

  /* Wide Keyboard */
  .kana-keyboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
    gap: 10px;
    padding: 20px;
    width: 95%;
    max-width: 800px;
    margin: 20px auto;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 20px;
  }

  .kana-key {
    padding: 15px;
    background: var(--glass);
    border: 1px solid var(--sky-blue);
    border-radius: 10px;
    color: white;
    cursor: pointer;
  }

  .algeria-badge {
    width: 40px; height: 40px; border-radius: 50%; border: 2px solid white;
  }
</style>
</head>
<body>

<div class="sakura-container" id="sakuraLayer"></div>

<!-- Header -->
<div class="header-ui">
  <div class="samurai-wrapper">🥷</div>
  <div class="welcome-board">
    مرحبًا سعاد 🌸 <br>
    <span style="color: var(--gold); font-size: 16px;">日本へようこそ</span>
  </div>

  <div class="progress-glass">
    <span>Lv: 1</span>
    <span style="color: var(--sky-blue);">XP: 450/1000</span>
    <span>Words: 12/72</span>
    <span>⭐: 150</span>
  </div>
</div>

<!-- Map -->
<div class="map-container">
  <!-- Dynamic generation of stages -->
  <div class="stage-node">🌸 ①</div>
  <div class="path-beam"></div>
  <div class="stage-node locked"><span class="lock-icon">🔒</span> ②</div>
  <div class="path-beam"></div>
  <div class="stage-node locked"><span class="lock-icon">🔒</span> ③</div>
  <!-- ... etc -->
</div>

<!-- Wide Keyboard -->
<div class="kana-keyboard" id="keyboard">
  <!-- Keys generated via JS -->
</div>

<script>
  // Add Sakura Petals
  const container = document.getElementById('sakuraLayer');
  for(let i=0; i<30; i++){
    const s = document.createElement('div');
    s.className = 'sakura';
    s.textContent = '🌸';
    s.style.left = Math.random()*100 + '%';
    s.style.animationDuration = (Math.random()*5 + 5) + 's';
    s.style.animationDelay = Math.random()*5 + 's';
    container.appendChild(s);
  }

  // Populate Keyboard
  const keys = ['あ','い','う','え','お','か','き','く','け','こ','さ','し','す','せ','そ','た','ち','つ','て','と','な','に','ぬ','ね','の','は','ひ','ふ','へ','ほ','ま','み','む','め','も','や','ゆ','よ','ら','り','る','れ','ろ','わ','を','ん'];
  const kb = document.getElementById('keyboard');
  keys.forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'kana-key';
    btn.textContent = k;
    kb.appendChild(btn);
  });
</script>
</body>
</html>
