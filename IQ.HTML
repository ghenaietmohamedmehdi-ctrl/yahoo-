<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mehdi App - JLPT N5</title>
    <style>
        :root {
            --field-green: #2e7d32;
            --line-white: rgba(255, 255, 255, 0.7);
            --gold: #ffd700;
        }
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 0.5s ease;
        }
        .splash-card {
            background: #1e1e1e; padding: 30px; border-radius: 15px;
            text-align: center; border: 2px solid var(--gold);
            max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .splash-btn {
            background: var(--field-green); color: white;
            border: none; padding: 12px 30px; font-size: 18px;
            border-radius: 8px; cursor: pointer; margin-top: 15px;
        }
        header {
            width: 100%; max-width: 800px;
            display: flex; justify-content: space-between;
            align-items: center; padding: 15px;
        }
        .app-title { font-size: 28px; font-weight: bold; letter-spacing: 2px; }
        .app-icon {
            width: 60px; height: 60px; border-radius: 50%;
            border: 3px solid var(--gold); overflow: hidden;
            background: white; box-shadow: 0 0 15px var(--gold);
        }
        .algeria-flag { width: 100%; height: 100%; display: flex; position: relative; }
        .flag-left { width: 50%; background: #006633; }
        .flag-right { width: 50%; background: #ffffff; }
        .flag-star-crescent {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); color: #cc0000; font-size: 26px;
        }
        .progress-container {
            width: 95%; max-width: 800px;
            background: #1e1e1e; border-radius: 8px;
            padding: 10px; margin: 10px 0;
        }
        .progress-track {
            position: relative; background: #333; height: 8px;
            border-radius: 4px; margin: 15px 0;
        }
        .progress-ball {
            position: absolute; top: -14px; font-size: 28px;
            transition: left 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .soccer-field {
            position: relative; width: 95%; max-width: 800px;
            height: 520px; background-color: var(--field-green);
            background-image: linear-gradient(rgba(255,255,255,0.06) 50%, transparent 50%);
            background-size: 100% 40px; border: 4px solid white;
            border-radius: 12px; overflow: hidden;
        }
        .center-line {
            position: absolute; top: 50%; left: 0; width: 100%; height: 3px;
            background: var(--line-white);
        }
        .center-circle {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 120px; height: 120px;
            border: 3px solid var(--line-white); border-radius: 50%;
        }
        .corner-box {
            position: absolute; background: rgba(0,0,0,0.8);
            padding: 8px 12px; border-radius: 6px;
            border: 2px solid; font-size: 13px; text-align: center;
            max-width: 160px;
        }
        .top-left { top: 10px; left: 10px; border-color: #ff5252; }
        .top-right { top: 10px; right: 10px; border-color: #40c4ff; }
        .bottom-left { bottom: 10px; left: 10px; border-color: #e040fb; }
        .bottom-right { bottom: 10px; right: 10px; border-color: #00e676; }
        .quiz-zone {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%; max-width: 360px;
            background: rgba(20,20,20,0.96); border: 3px solid var(--gold);
            border-radius: 14px; padding: 20px; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }
        .word-jp { font-size: 48px; font-weight: bold; margin: 12px 0; }
        .word-romaji { font-size: 19px; color: var(--gold); margin-bottom: 20px; }
        .options-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
        }
        .option-btn {
            background: #2a2a2a; color: white;
            border: 2px solid #555; padding: 14px 10px;
            font-size: 16px; border-radius: 8px;
            cursor: pointer; transition: all 0.2s;
        }
        .option-btn:hover { background: #3a3a3a; transform: scale(1.03); }
        .correct { background: #2e7d32 !important; border-color: #4caf50 !important; }
        .wrong { background: #c62828 !important; border-color: #ef5350 !important; }
        .score-board { margin-bottom: 12px; font-size: 15px; color: #ddd; }
    </style>
</head>
<body>
    <div class="splash-screen" id="splashScreen">
        <div class="splash-card">
            <h2>🏆 مستعد للتحدي؟</h2>
            <p>مرحباً بك في معسكر المونديال التدريبي لـ JLPT N5<br>ركّز واستعن بالله!</p>
            <button class="splash-btn" onclick="startApp()">ركلة البداية ⚽</button>
        </div>
    </div>

    <header>
        <div class="app-title">Mehdi</div>
        <div class="app-icon">
            <div class="algeria-flag">
                <div class="flag-left"></div>
                <div class="flag-right"></div>
                <div class="flag-star-crescent">☪★</div>
            </div>
        </div>
    </header>

    <div class="progress-container">
        <div class="progress-track">
            <div class="progress-ball" id="soccerBall">⚽</div>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 12px; color: #aaa;">
            <span>🛡️ الدفاع</span><span>⚙️ الوسط</span><span>⚔️ الهجوم</span><span>🥅 الهدف</span>
        </div>
    </div>

    <div class="soccer-field">
        <div class="center-line"></div>
        <div class="center-circle"></div>
        
        <div class="corner-box top-left">
            <strong>الطبيعة والوقت</strong><br><span id="count-c1">0 كلمة</span>
        </div>
        <div class="corner-box top-right">
            <strong>الكائنات والناس</strong><br><span id="count-c2">0 كلمة</span>
        </div>
        <div class="corner-box bottom-left">
            <strong>الأطعمة والمشروبات</strong><br><span id="count-c3">0 كلمة</span>
        </div>
        <div class="corner-box bottom-right">
            <strong>الأماكن والأشياء</strong><br><span id="count-c4">0 كلمة</span>
        </div>

        <div class="quiz-zone">
            <div class="score-board">الكلمة: <span id="current-index">1</span> / 72</div>
            <div class="word-jp" id="target-word">あさ</div>
            <div class="word-romaji" id="target-romaji">Asa</div>
            <div class="options-grid" id="options-container"></div>
        </div>
    </div>

    <script>
        const wordsDataset = [
            // (الكود الذي أرسلته بالكامل - تم تنظيفه)
            { japanese: "あさ", romaji: "Asa", arabic: "الصباح", category: "Nature & Time" },
            { japanese: "あき", romaji: "Aki", arabic: "الخريف", category: "Nature & Time" },
            { japanese: "かわ", romaji: "Kawa", arabic: "نهر", category: "Nature & Time" },
            { japanese: "はる", romaji: "Haru", arabic: "الربيع", category: "Nature & Time" },
            { japanese: "なつ", romaji: "Natsu", arabic: "الصيف", category: "Nature & Time" },
            { japanese: "ふゆ", romaji: "Fuyu", arabic: "الشتاء", category: "Nature & Time" },
            { japanese: "やま", romaji: "Yama", arabic: "جبل", category: "Nature & Time" },
            { japanese: "ゆき", romaji: "Yuki", arabic: "ثلج", category: "Nature & Time" },
            { japanese: "よる", romaji: "Yoru", arabic: "الليل", category: "Nature & Time" },
            { japanese: "はっぱ", romaji: "Happa", arabic: "ورقة شجر", category: "Nature & Time" },
            { japanese: "きょう", romaji: "Kyou", arabic: "اليوم", category: "Nature & Time" },
            { japanese: "ごぜん", romaji: "Gozen", arabic: "صباحاً (AM)", category: "Nature & Time" },
            { japanese: "さかな", romaji: "Sakana", arabic: "سمكة", category: "People & Animals" },
            { japanese: "とり", romaji: "Tori", arabic: "طائر", category: "People & Animals" },
            { japanese: "ねこ", romaji: "Neko", arabic: "قطة", category: "People & Animals" },
            { japanese: "いぬ", romaji: "Inu", arabic: "كلب", category: "People & Animals" },
            { japanese: "ぱんだ", romaji: "Panda", arabic: "باندا", category: "People & Animals" },
            { japanese: "さんま", romaji: "Sanma", arabic: "سمك الساورة", category: "People & Animals" },
            { japanese: "おかあさん", romaji: "Okaasan", arabic: "الأم", category: "People & Animals" },
            { japanese: "おとうさん", romaji: "Otousan", arabic: "الأب", category: "People & Animals" },
            { japanese: "おとうと", romaji: "Otouto", arabic: "الأخ الأصغر", category: "People & Animals" },
            { japanese: "おにいさん", romaji: "Oniisan", arabic: "الأخ الأكبر", category: "People & Animals" },
            { japanese: "おねえさん", romaji: "Oneesan", arabic: "الأخت الكبرى", category: "People & Animals" },
            { japanese: "いもうと", romaji: "Imouto", arabic: "الأخت الصغرى", category: "People & Animals" },
            { japanese: "せんせい", romaji: "Sensei", arabic: "معلم", category: "People & Animals" },
            { japanese: "がくせい", romaji: "Gakusei", arabic: "طالب", category: "People & Animals" },
            { japanese: "かいしゃいん", romaji: "Kaishayin", arabic: "موظف شركة", category: "People & Animals" },
            { japanese: "きゃく", romaji: "Kyaku", arabic: "ضيف/زبون", category: "People & Animals" },
            { japanese: "なまえ", romaji: "Namae", arabic: "اسم", category: "People & Animals" },
            { japanese: "とんかつ", romaji: "Tonkatsu", arabic: "شرائح لحم مقلية", category: "Food & Drinks" },
            { japanese: "てんぷら", romaji: "Tenpura", arabic: "تمبورا (مأكولات مقلية)", category: "Food & Drinks" },
            { japanese: "たまご", romaji: "Tamago", arabic: "بيض", category: "Food & Drinks" },
            { japanese: "みず", romaji: "Mizu", arabic: "ماء", category: "Food & Drinks" },
            { japanese: "ごはん", romaji: "Gohan", arabic: "أرز مطبوخ/وجبة", category: "Food & Drinks" },
            { japanese: "ぎゅうにく", romaji: "Gyuuniku", arabic: "لحم بقر", category: "Food & Drinks" },
            { japanese: "おちゃ", romaji: "Ocha", arabic: "شاي أخضر", category: "Food & Drinks" },
            { japanese: "こうちゃ", romaji: "Koocha", arabic: "شاي أسود", category: "Food & Drinks" },
            { japanese: "ぎゅうにゅう", romaji: "Gyuunyuu", arabic: "حليب", category: "Food & Drinks" },
            { japanese: "こんにゃく", romaji: "Konnyaku", arabic: "هلام الكونياكو", category: "Food & Drinks" },
            { japanese: "かんぱい", romaji: "Kanpai", arabic: "في صحتك / نخبك", category: "Food & Drinks" },
            { japanese: "くつ", romaji: "Kutsu", arabic: "حذاء", category: "Places & Objects" },
            { japanese: "さいふ", romaji: "Saifu", arabic: "محفظة", category: "Places & Objects" },
            { japanese: "ふね", romaji: "Fune", arabic: "سفينة/قارب", category: "Places & Objects" },
            { japanese: "てんと", romaji: "Tento", arabic: "خيمة", category: "Places & Objects" },
            { japanese: "ほん", romaji: "Hon", arabic: "كتاب", category: "Places & Objects" },
            { japanese: "にほん", romaji: "Nihon", arabic: "اليابان", category: "Places & Objects" },
            { japanese: "かんこく", romaji: "Kankoku", arabic: "كوريا الجنوبية", category: "Places & Objects" },
            { japanese: "ちゅうごく", romaji: "Chuugoku", arabic: "الصين", category: "Places & Objects" },
            { japanese: "とけい", romaji: "Tokei", arabic: "ساعة", category: "Places & Objects" },
            { japanese: "でんわ", romaji: "Denwa", arabic: "هاتف", category: "Places & Objects" },
            { japanese: "えいご", romaji: "Eigo", arabic: "اللغة الإنجليزية", category: "Places & Objects" },
            { japanese: "かばん", romaji: "Kaban", arabic: "حقيبة", category: "Places & Objects" },
            { japanese: "きっぷ", romaji: "Kippu", arabic: "تذكرة", category: "Places & Objects" },
            { japanese: "ざっし", romaji: "Zasshi", arabic: "مجلة", category: "Places & Objects" },
            { japanese: "いっかい", romaji: "Ikkai", arabic: "مرة واحدة / الطابق الأول", category: "Places & Objects" },
            { japanese: "ひゃくえん", romaji: "Hyakuen", arabic: "100 ين", category: "Places & Objects" },
            { japanese: "えき", romaji: "Eki", arabic: "محطة", category: "Places & Objects" },
            { japanese: "ぎんこう", romaji: "Ginkou", arabic: "بنك", category: "Places & Objects" },
            { japanese: "ゆうびんきょく", romaji: "Yuubinkyoku", arabic: "مكتب البريد", category: "Places & Objects" },
            { japanese: "きょうしつ", romaji: "Kyoushitsu", arabic: "قاعة الدرس", category: "Places & Objects" },
            { japanese: "としょかん", romaji: "Toshokan", arabic: "مكتبة", category: "Places & Objects" },
            { japanese: "びじゅつかん", romaji: "Bijutsukan", arabic: "متحف الفنون", category: "Places & Objects" },
            { japanese: "がっこう", romaji: "Gakkou", arabic: "مدرسة", category: "Places & Objects" },
            { japanese: "びょういん", romaji: "Byouin", arabic: "مستشفى", category: "Places & Objects" },
            { japanese: "えいが", romaji: "Eiga", arabic: "فيلم/سينما", category: "Places & Objects" },
            { japanese: "おんがく", romaji: "Ongaku", arabic: "موسيقى", category: "Places & Objects" },
            { japanese: "りょこう", romaji: "Ryokou", arabic: "سفر/رحلة", category: "Places & Objects" },
            { japanese: "どくしょ", romaji: "Dokusho", arabic: "قراءة الكتب", category: "Places & Objects" },
            { japanese: "しゅみ", romaji: "Shumi", arabic: "هواية", category: "Places & Objects" },
            { japanese: "りょうり", romaji: "Ryouri", arabic: "الطبخ", category: "Places & Objects" },
            { japanese: "は", romaji: "Ha", arabic: "سن / ورقة شجر", category: "Places & Objects" },
            { japanese: "みみ", romaji: "Mimi", arabic: "أذن", category: "Places & Objects" }
        ];

        let currentIndex = 0;
        let isChecking = false;

        function startApp() {
            document.getElementById('splashScreen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splashScreen').style.display = 'none';
                loadQuestion();
            }, 500);
        }

        function updateCounts() {
            const counts = { "Nature & Time": 0, "People & Animals": 0, "Food & Drinks": 0, "Places & Objects": 0 };
            wordsDataset.forEach(w => counts[w.category]++);
            document.getElementById('count-c1').textContent = counts["Nature & Time"] + ' كلمة';
            document.getElementById('count-c2').textContent = counts["People & Animals"] + ' كلمة';
            document.getElementById('count-c3').textContent = counts["Food & Drinks"] + ' كلمة';
            document.getElementById('count-c4').textContent = counts["Places & Objects"] + ' كلمة';
        }

        function updateBallPosition() {
            const percentage = (currentIndex / wordsDataset.length) * 100;
            document.getElementById('soccerBall').style.left = percentage + '%';
        }

        function loadQuestion() {
            isChecking = false;
            if (currentIndex >= wordsDataset.length) {
                alert("🎉 مبروك! لقد أنهيت جميع الكلمات بنجاح!");
                currentIndex = 0;
            }
            document.getElementById('current-index').innerText = currentIndex + 1;
            updateBallPosition();

            const current = wordsDataset[currentIndex];
            document.getElementById('target-word').innerText = current.japanese;
            document.getElementById('target-romaji').innerText = current.romaji;

            let options = [current.arabic];
            while (options.length < 4) {
                let random = wordsDataset[Math.floor(Math.random() * wordsDataset.length)].arabic;
                if (!options.includes(random)) options.push(random);
            }
            options.sort(() => Math.random() - 0.5);

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(btn, opt, current.arabic);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selectedBtn, selectedOpt, correctOpt) {
            if (isChecking) return;
            isChecking = true;

            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                if (btn.innerText === correctOpt) btn.classList.add('correct');
            });
            if (selectedOpt !== correctOpt) {
                selectedBtn.classList.add('wrong');
            }

            setTimeout(() => {
                currentIndex++;
                loadQuestion();
            }, 1500);
        }

        // بدء التطبيق
        window.onload = () => {
            updateCounts();
        };
    </script>
</body>
</html>
