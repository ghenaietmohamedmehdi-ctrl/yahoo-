<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mehdi App - JLPT N5</title>
    <style>
        :root {
            --field-green: #2e7d32;
            --line-white: rgba(255, 255, 255, 0.7);
            --gold: #ffd700;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* شاشة الانطلاق التلقائية */
        .splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }
        .splash-card {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid var(--gold);
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .splash-card h2 { color: var(--gold); margin-top: 0; }
        .splash-btn {
            background: var(--field-green);
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }

        /* الهوية البصرية العلوية */
        header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            box-sizing: border-box;
        }
        .app-title {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #ffffff;
        }
        .app-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            overflow: hidden;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px var(--gold);
        }
        /* علم الجزائر داخل الأيقونة */
        .algeria-flag {
            width: 100%;
            height: 100%;
            display: flex;
            position: relative;
        }
        .flag-left { width: 50%; background: #006633; }
        .flag-right { width: 50%; background: #ffffff; }
        .flag-star-crescent {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #cc0000;
            font-size: 24px;
            line-height: 1;
        }

        /* شريط التقدم (الملعب المصغر) */
        .progress-container {
            width: 95%;
            max-width: 800px;
            background: #1e1e1e;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        .progress-track {
            display: flex;
            justify-content: space-between;
            position: relative;
            background: #333;
            height: 6px;
            border-radius: 3px;
            margin: 15px 0;
        }
        .progress-ball {
            position: absolute;
            top: -12px;
            left: 0%;
            font-size: 24px;
            transition: left 0.5s ease;
            transform: translateX(-50%);
        }
        .stage-label { font-size: 12px; color: #aaa; }

        /* أرضية الملعب الرئيسية */
        .soccer-field {
            position: relative;
            width: 95%;
            max-width: 800px;
            height: 520px;
            background-color: var(--field-green);
            background-image: linear-gradient(rgba(255,255,255,0.05) 50%, transparent 50%);
            background-size: 100% 40px;
            border: 3px solid white;
            border-radius: 10px;
            box-sizing: border-box;
            overflow: hidden;
        }
        /* تخطيط الملعب */
        .center-circle {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 120px; height: 120px;
            border: 3px solid var(--line-white);
            border-radius: 50%;
        }
        .center-line {
            position: absolute;
            top: 50%; left: 0; width: 100%; height: 3px;
            background: var(--line-white);
        }

        /* زوايا العائلات */
        .corner-box {
            position: absolute;
            background: rgba(0, 0, 0, 0.75);
            padding: 8px 12px;
            border-radius: 5px;
            border: 1px solid white;
            font-size: 12px;
            max-width: 160px;
            text-align: center;
        }
        .top-left { top: 10px; left: 10px; border-color: #ff5252; }
        .top-right { top: 10px; right: 10px; border-color: #40c4ff; }
        .bottom-left { bottom: 10px; left: 10px; border-color: #e040fb; }
        .bottom-right { bottom: 10px; right: 10px; border-color: #00e676; }

        /* منطقة التفاعل والأسئلة (وسط الملعب) */
        .quiz-zone {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 340px;
            background: rgba(20, 20, 20, 0.95);
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            z-index: 10;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }
        .word-jp {
            font-size: 42px;
            margin: 10px 0;
            color: #ffffff;
            font-weight: bold;
        }
        .word-romaji {
            font-size: 18px;
            color: var(--gold);
            margin-bottom: 20px;
            font-style: italic;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .option-btn {
            background: #2a2a2a;
            color: white;
            border: 1px solid #444;
            padding: 12px;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-btn:hover { background: #3a3a3a; }
        
        /* التغذية الراجعة للإجابات */
        .correct { background: #2e7d32 !important; border-color: #4caf50 !important; }
        .wrong { background: #c62828 !important; border-color: #ef5350 !important; }

        .score-board {
            margin-top: 10px;
            font-size: 14px;
            color: #ccc;
        }
    </style>
</head>
<body>

    <!-- شاشة الانطلاق التلقائية -->
    <div class="splash-screen" id="splashScreen">
        <div class="splash-card">
            <h2>🏆 مستعد للتحدي؟</h2>
            <p>مرحباً بك في معسكر المونديال التدريبي لـ JLPT N5. استعن بالله وركّز جيداً لضمان إتقان الكلمات والتفوق التام!</p>
            <button class="splash-btn" onclick="closeSplash()">ركلة البداية ⚽</button>
        </div>
    </div>

    <!-- الهوية العلوية -->
    <header>
        <div class="app-title">Mehdi</div>
        <div class="app-icon">
            <div class="algeria-flag">
                <div class="flag-left"></div>
                <div class="flag-right"></div>
                <div class="flag-star-crescent">☪★</div>
            </div>
        </div>
    </header>

    <!-- شريط تقدم الكرة المونديالية -->
    <div class="progress-container">
        <div class="progress-track">
            <div class="progress-ball" id="soccerBall">⚽</div>
        </div>
        <div style="display: flex; justify-content: space-between;">
            <span class="stage-label">🛡️ الدفاع</span>
            <span class="stage-label">⚙️ الوسط</span>
            <span class="stage-label">⚔️ الهجوم</span>
            <span class="stage-label">🥅 الهدف</span>
        </div>
    </div>

    <!-- أرضية الملعب التفاعلية -->
    <div class="soccer-field">
        <div class="center-line"></div>
        <div class="center-circle"></div>

        <!-- زوايا عائلات الكلمات الأربعة -->
        <div class="corner-box top-left">
            <strong>الطبيعة والوقت</strong><br><span id="count-c1">12 كلمة</span>
        </div>
        <div class="corner-box top-right">
            <strong>الكائنات والناس</strong><br><span id="count-c2">17 كلمة</span>
        </div>
        <div class="corner-box bottom-left">
            <strong>الأطعمة والمشروبات</strong><br><span id="count-c3">11 كلمة</span>
        </div>
        <div class="corner-box bottom-right">
            <strong>الأماكن والأنشطة</strong><br><span id="count-c4">32 كلمة</span>
        </div>

        <!-- منطقة الاختبار المركزي -->
        <div class="quiz-zone">
            <div class="score-board">الكلمة: <span id="current-index">1</span> / 72</div>
            <div class="word-jp" id="target-word">あさ</div>
            <div class="word-romaji" id="target-romaji">Asa</div>
            
            <div class="options-grid" id="options-container">
                <!-- أزرار الخيارات تولد برمجياً هنا -->
            </div>
        </div>
    </div>

    <script>
        // قاعدة البيانات الكاملة للـ 72 كلمة مدمجة ومصححة بالكامل
        const wordsDataset = [
            // الطبيعة والفصول والوقت (12)
            { j: "あさ", r: "Asa", a: "الصباح", c: "c1" },
            { j: "あき", r: "Aki", a: "الخريف", c: "c1" },
            { j: "かわ", r: "Kawa", a: "نهر", c: "c1" },
            { j: "はる", r: "Haru", a: "الربيع", c: "c1" },
            { j: "なつ", r: "Natsu", a: "الصيف", c: "c1" },
            { j: "ふゆ", r: "Fuyu", a: "الشتاء", c: "c1" },
            { j: "やま", r: "Yama", a: "جبل", c: "c1" },
            { j: "ゆき", r: "Yuki", a: "ثلج", c: "c1" },
            { j: "よる", r: "Yoru", a: "الليل", c: "c1" },
            { j: "はっぱ", r: "Happa", a: "ورقة شجر", c: "c1" },
            { j: "きょう", r: "Kyou", a: "اليوم", c: "c1" },
            { j: "ごぜん", r: "Gozen", a: "صباحاً (AM)", c: "c1" },

            // الكائنات الحية والناس (17)
            { j: "さかな", r: "Sakana", a: "سمكة", c: "c2" },
            { j: "とり", r: "Tori", a: "طائر", c: "c2" },
            { j: "ねこ", r: "Neko", a: "قطة", c: "c2" },
            { j: "いぬ", r: "Inu", a: "كلب", c: "c2" },
            { j: "ぱんだ", r: "Panda", a: "باندا", c: "c2" },
            { j: "さんま", r: "Sanma", a: "سمك الساورة", c: "c2" },
            { j: "おかあさん", r: "Okaasan", a: "الأم", c: "c2" },
            { j: "おとうさん", r: "Otousan", a: "الأب", c: "c2" },
            { j: "おとうと", r: "Otouto", a: "الأخ الأصغر", c: "c2" },
            { j: "おにいさん", r: "Oniisan", a: "الأخ الأكبر", c: "c2" },
            { j: "おねえさん", r: "Oneesan", a: "الأخت الكبرى", c: "c2" },
            { j: "いもうと", r: "Imouto", a: "الأخت الصغرى", c: "c2" },
            { j: "せんせい", r: "Sensei", a: "معلم", c: "c2" },
            { j: "がくせい", r: "Gakusei", a: "طالب", c: "c2" },
            { j: "かいしゃいん", "r": "Kaishayin", a: "موظف شركة", c: "c2" },
            { j: "きゃく", r: "Kyaku", a: "ضيف/زبون", c: "c2" },
            { j: "なまえ", r: "Namae", a: "اسم", c: "c2" },

            // الأطعمة والمشروبات (11)
            { j: "とんかつ", r: "Tonkatsu", a: "شرائح لحم مقلية", c: "c3" },
            { j: "てんぷら", r: "Tenpura", a: "تمبورا", c: "c3" },
            { j: "たまご", r: "Tamago", a: "بيض", c: "c3" },
            { j: "みず", r: "Mizu", a: "ماء", c: "c3" },
            { j: "ごはん", r: "Gohan", a: "أرز مطبوخ/وجبة", c: "c3" },
            { j: "ぎゅうにく", r: "Gyuuniku", a: "لحم بقر", c: "c3" },
            { j: "おちゃ", r: "Ocha", a: "شاي أخضر", c: "c3" },
            { j: "こうちゃ", r: "Koocha", a: "شاي أسود", c: "c3" },
            { j: "ぎゅうにゅう", r: "Gyuunyuu", a: "حليب", c: "c3" },
            { j: "こんにゃく", r: "Konnyaku", a: "هلام الكونياكو", c: "c3" },
            { j: "かんぱい", r: "Kanpai", a: "في صحتك / نخبك", c: "c3" },

            // الأماكن والأشياء والأنشطة (32)
            { j: "くつ", r: "Kutsu", a: "حذاء", c: "c4" },
            { j: "さいふ", r: "Saifu", a: "محفظة", c: "c4" },
            { j: "ふね", r: "Fune", a: "سفينة/قارب", c: "c4" },
            { j: "てんと", r: "Tento", a: "خيمة", c: "c4" },
            { j: "ほん", r: "Hon", a: "كتاب", c: "c4" },
            { j: "にほん", r: "Nihon", a: "اليابان", c: "c4" },
            { j: "かんこく", r: "Kankoku", a: "كوريا الجنوبية", c: "c4" },
            { j: "ちゅうごく", r: "Chuugoku", a: "الصين", c: "c4" },
            { j: "とけい", r: "Tokei", a: "ساعة", c: "c4" },
            { j: "でんわ", r: "Denwa", a: "هاتف", c: "c4" },
            { j: "えいご", r: "Eigo", a: "اللغة الإنجليزية", c: "c4" },
            { j: "かばん", r: "Kaban", a: "حقيبة", c: "c4" },
            { j: "きっぷ", r: "Kippu", a: "تذكرة", c: "c4" },
            { j: "ざっし", r: "Zasshi", a: "مجلة", c: "c4" },
            { j: "いっかい", r: "Ikkai", a: "مرة واحدة / الطابق الأول", c: "c4" },
            { j: "ひゃくえん", r: "Hyakuen", a: "100 ين", c: "c4" },
            { j: "えき", r: "Eki", a: "محطة", c: "c4" },
            { j: "ぎんこう", r: "Ginkou", a: "بنك", c: "c4" },
            { j: "ゆうびんきょく", r: "Yuubinkyoku", a: "مكتب البريد", c: "c4" },
            { j: "きょうしつ", r: "Kyoushitsu", a: "قاعة الدرس", c: "c4" },
            { j: "としょかん", r: "Toshokan", a: "مكتبة", c: "c4" },
            { j: "びじゅつかん", r: "Bijutsukan", a: "متحف الفنون", c: "c4" },
            { j: "がっこう", r: "Gakkou", a: "مدرسة", c: "c4" },
            { j: "びょういん", r: "Byouin", a: "مستشفى", c: "c4" },
            { j: "えいが", "r": "Eiga", a: "فيلم/سينما", c: "c4" },
            { j: "おんがく", r: "Ongaku", a: "موسيقى", c: "c4" },
            { j: "りょこう", r: "Ryokou", a: "سفر/رحلة", c: "c4" },
            { j: "どくしょ", r: "Dokusho", a: "قراءة الكتب", c: "c4" },
            { j: "しゅみ", r: "Shumi", a: "هواية", c: "c4" },
            { j: "りょうり", r: "Ryouri", a: "الطبخ", c: "c4" },
            { j: "は", r: "Ha", a: "سن / ورقة شجر", c: "c4" },
            { j: "みみ", r: "Mimi", a: "أذن", c: "c4" }
        ];

        let currentIndex = 0;
        let isChecking = false;

        function closeSplash() {
            document.getElementById('splashScreen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splashScreen').style.display = 'none';
            }, 500);
            loadQuestion();
        }

        function loadQuestion() {
            isChecking = false;
            if (currentIndex >= wordsDataset.length) {
                alert("🎉 مبروك! لقد سجلت هدف الفوز وأنهيت كافة الكلمات بنجاح!");
                currentIndex = 0;
            }

            // تحديث العداد وكرة التقدم
            document.getElementById('current-index').innerText = currentIndex + 1;
            updateBallPosition();

            const currentData = wordsDataset[currentIndex];
            document.getElementById('target-word').innerText = currentData.j;
            document.getElementById('target-romaji').innerText = currentData.r;

            // توليد الخيارات (الخيارات الخاطئة + الصحيحة)
            let options = [currentData.a];
            while (options.length < 4) {
                let randomWord = wordsDataset[Math.floor(Math.random() * wordsDataset.length)].a;
                if (!options.includes(randomWord)) {
                    options.push(randomWord);
                }
            }
            // خلط الخيارات عشوائياً
            options.sort(() => Math.random() - 0.5);

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(btn, opt, currentData.a);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selectedBtn, selectedOpt, correctOpt) {
            if (isChecking) return;
            isChecking = true;

            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                if (btn.innerText === correctOpt) {
                    btn.classList.add('correct');
                }
            });

            if (selectedOpt !== correctOpt) {
                selectedBtn.classList.add('wrong');
            }

            // الانتقال للكلمة التالية بعد ثانية ونصف
            setTimeout(() => {
                currentIndex++;
                loadQuestion();
            }, 1500);
        }

        function updateBallPosition() {
            const percentage = (currentIndex / wordsDataset.length) * 100;
            document.getElementById('soccerBall').style.left = percentage + '%';
        }
    </script>
</body>
</html>
